# Per-namespace ResourceQuota + LimitRange
# Prevents total CPU/memory/pods exceeding safe thresholds
# Total system: 16GB RAM, Ryzen 7 5700U (8 cores)

---
# default namespace — Minecraft + Homepage
# Minecraft is the heaviest workload (~4GB), Homepage is light
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: default
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 5Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "10"
    persistentvolumeclaims: "5"
    services: "5"
    configmaps: "10"
    secrets: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: default
spec:
  limits:
    - default:
        memory: 2Gi
        cpu: "1"
      defaultRequest:
        memory: 256Mi
        cpu: "100m"
      max:
        memory: 4Gi
        cpu: "2"
      type: Container
---
# monitoring namespace — Prometheus, Grafana, Loki, Promtail
# Heaviest namespace: ~2.2GB total
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "6"
    limits.memory: 8Gi
    pods: "25"
    persistentvolumeclaims: "5"
    services: "10"
    configmaps: "15"
    secrets: "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
spec:
  limits:
    - default:
        memory: 1Gi
        cpu: "500m"
      defaultRequest:
        memory: "128Mi"
        cpu: "100m"
      max:
        memory: 4Gi
        cpu: "2"
      type: Container
---
