---
# ResourceQuotas prevent any single namespace from consuming
# more than its fair share of CPU/memory/pods.
#
# Limits are set ~20-50% above current usage for growth headroom.
# Total system: 16 cores, 15674Mi RAM.

# --- monitoring (Prometheus + Grafana + Loki + Promtail + Exporters) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "3000m"
    requests.memory: 3Gi
    limits.cpu: "4000m"
    limits.memory: 5Gi
    pods: "20"
---
# --- default (Minecraft + Homepage) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: default
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "2000m"
    requests.memory: 2Gi
    limits.cpu: "4000m"
    limits.memory: 5Gi
    pods: "10"
---
# --- ollama (Ollama inference) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ollama-quota
  namespace: ollama
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "1500m"
    requests.memory: 3Gi
    limits.cpu: "5000m"
    limits.memory: 5Gi
    pods: "5"
---
# --- argocd (ArgoCD server + controller + Redis + Dex) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: argocd-quota
  namespace: argocd
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "1000m"
    requests.memory: 1Gi
    limits.cpu: "3000m"
    limits.memory: 4Gi
    pods: "10"
---
# --- discord-bot (Discord bot + Incident Responder) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: discord-bot-quota
  namespace: discord-bot
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 512Mi
    limits.cpu: "2000m"
    limits.memory: 1Gi
    pods: "5"
---
# --- cert-manager (cert-manager + cainjector + webhook) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cert-manager-quota
  namespace: cert-manager
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: 128Mi
    limits.cpu: "500m"
    limits.memory: 256Mi
    pods: "5"
---
# --- kube-system (CoreDNS + Traefik + metrics-server + svclb) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kube-system-quota
  namespace: kube-system
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "1500m"
    requests.memory: 1Gi
    limits.cpu: "3000m"
    limits.memory: 2Gi
    pods: "15"
---
# --- eso-system (External Secrets Operator) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: eso-system-quota
  namespace: eso-system
  labels:
    app: resource-quotas
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: 256Mi
    limits.cpu: "500m"
    limits.memory: 512Mi
    pods: "5"
