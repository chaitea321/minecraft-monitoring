# Resource limits for kube-system components
# Applied via direct manifest application (not ArgoCD-managed)

---
# Traefik ingress controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-resources-patch
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
    spec:
      containers:
      - name: traefik
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
# svclb-minecraft-service (LB TCP 25565)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: svclb-minecraft-resources-patch
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 0
