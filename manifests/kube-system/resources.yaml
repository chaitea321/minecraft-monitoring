    matchLabels:
      app.kubernetes.io/name: svclb-minecraft
  template:
    metadata:
      labels:
        app.kubernetes.io/name: svclb-minecraft
    spec:
      containers:
      - name: lb-tcp-25565
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
---
