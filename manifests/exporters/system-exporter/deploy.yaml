apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-exporter
  namespace: monitoring
  labels:
    app: system-exporter
    release: kube-prometheus-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: system-exporter
  template:
    metadata:
      labels:
        app: system-exporter
        release: kube-prometheus-stack
    spec:
      containers:
        - name: exporter
          image: evince55/system-exporter:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: metrics
            - containerPort: 8001
              name: health
          env:
            - name: METRICS_PORT
              value: "8000"
            - name: HEALTH_PORT
              value: "8001"
            - name: COLLECT_INTERVAL
              value: "15"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: system-exporter
  namespace: monitoring
  labels:
    app: system-exporter
    release: kube-prometheus-stack
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: metrics
    - port: 8001
      targetPort: 8001
      name: health
  selector:
    app: system-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: system-exporter
  namespace: monitoring
  labels:
    app: system-exporter
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: system-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
