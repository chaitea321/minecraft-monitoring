apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-ruler-alerts
  namespace: monitoring
  labels:
    loki_rule: "1"
data:
  minecraft.log.rules: |
    groups:
      - name: minecraft.log.rules
        rules:
          - alert: MinecraftHighErrorRate
            expr: sum by (instance)(count_over_time({app="minecraft"} |= "ERROR" [5m])) / 300 > 10
            for: 5m
            labels:
              severity: warning
              namespace: monitoring
            annotations:
              summary: "High error rate in Minecraft logs"
              description: "Minecraft application is generating more than 10 errors per second over the last 5 minutes."

          - alert: MinecraftGCStress
            expr: sum by (instance)(count_over_time({app="minecraft"} |= "GC" [5m])) / 300 > 5
            for: 5m
            labels:
              severity: warning
              namespace: monitoring
            annotations:
              summary: "High GC pressure in Minecraft logs"
              description: "Minecraft application is experiencing more than 5 GC events per second over the last 5 minutes."

          - alert: MinecraftChunkStress
            expr: sum by (instance)(count_over_time({app="minecraft"} |= "Chunk" |= "load" [5m])) / 300 > 20
            for: 5m
            labels:
              severity: info
              namespace: monitoring
            annotations:
              summary: "High chunk load rate in Minecraft logs"
              description: "Minecraft application is loading more than 20 chunks per second over the last 5 minutes."

          - alert: MinecraftPlayerDisconnects
            expr: sum by (instance)(count_over_time({app="minecraft"} |= "left the game" [5m])) / 300 > 3
            for: 5m
            labels:
              severity: info
              namespace: monitoring
            annotations:
              summary: "High player disconnect rate in Minecraft logs"
              description: "Minecraft application is seeing more than 3 player disconnects per second over the last 5 minutes."
